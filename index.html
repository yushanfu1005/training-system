<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教育訓練管理系統</title>
<style>
  :root{
    --ink:#1b2430;
    --ink-soft:#4d5a6b;
    --paper:#f5f7f9;
    --panel:#ffffff;
    --line:#e2e6ea;
    --navy:#1f3a5f;
    --navy-deep:#152943;
    --gold:#c8952c;
    --gold-soft:#f4e6c8;
    --ok:#2f7a4f;
    --ok-bg:#e6f4ea;
    --warn:#b3541e;
    --warn-bg:#fbe9dd;
    --pending:#6b6f76;
    --pending-bg:#eceef0;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",-apple-system,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--gold-soft);}

  /* ---------- Login ---------- */
  #loginScreen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 20% 15%, rgba(200,149,44,0.18), transparent 45%),
      linear-gradient(160deg, var(--navy-deep), var(--navy) 60%, #24466f);
    padding:24px;
  }
  .login-card{
    width:100%;
    max-width:380px;
    background:var(--panel);
    border-radius:16px;
    padding:40px 36px 32px;
    box-shadow:0 24px 60px rgba(10,20,35,0.35);
  }
  .login-eyebrow{
    font-size:12px;
    letter-spacing:.18em;
    color:var(--gold);
    font-weight:700;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .login-brand-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:24px;
  }
  .login-icon-box{
    width:44px; height:44px; flex-shrink:0;
    border-radius:11px;
    background:var(--navy-deep);
    color:#fff;
    font-size:20px;
    display:flex; align-items:center; justify-content:center;
  }
  .login-brand-title{font-size:15px; font-weight:800; color:var(--ink); letter-spacing:.01em;}
  .login-brand-sub{font-size:11.5px; color:var(--ink-soft); margin-top:2px;}
  .login-title{
    font-size:22px;
    font-weight:800;
    margin:0 0 4px;
    letter-spacing:.02em;
  }
  .login-sub{
    font-size:13px;
    color:var(--ink-soft);
    margin:0 0 28px;
  }
  .field{margin-bottom:16px;}
  .field label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:6px;
    letter-spacing:.03em;
  }
  .field input[type=text],
  .field input[type=password],
  .field input[type=date],
  .field select{
    width:100%;
    padding:11px 12px;
    border:1.5px solid var(--line);
    border-radius:8px;
    font-size:14px;
    font-family:inherit;
    color:var(--ink);
    background:#fff;
    transition:border-color .15s;
  }
  .field input:focus, .field select:focus{
    outline:none;
    border-color:var(--navy);
  }
  .remember-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:22px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .remember-row input{accent-color:var(--navy);}
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    border:none;
    border-radius:8px;
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    padding:11px 18px;
    transition:transform .1s, box-shadow .15s, background .15s;
    white-space:nowrap;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{
    background:var(--navy);
    color:#fff;
    width:100%;
  }
  .btn-primary:hover{background:var(--navy-deep);}
  .btn-gold{
    background:var(--gold);
    color:#3a2a05;
  }
  .btn-gold:hover{filter:brightness(1.05);}
  .btn-ghost{
    background:transparent;
    color:var(--ink-soft);
    border:1.5px solid var(--line);
  }
  .btn-ghost:hover{border-color:var(--navy);color:var(--navy);}
  .btn-danger{
    background:#fff;
    color:#b3311f;
    border:1.5px solid #f0c6bd;
  }
  .btn-danger:hover{background:#fdeeeb;}
  .btn-sm{padding:6px 12px; font-size:12.5px;}
  .login-error{
    background:#fdeeeb;
    color:#b3311f;
    border:1px solid #f0c6bd;
    border-radius:8px;
    padding:9px 12px;
    font-size:12.5px;
    margin-bottom:16px;
    display:none;
  }
  .login-hint{
    margin-top:20px;
    font-size:11.5px;
    color:#9aa4b0;
    line-height:1.6;
    border-top:1px dashed var(--line);
    padding-top:14px;
  }

  /* ---------- App shell ---------- */
  #app{display:none; min-height:100vh;}
  .shell{display:flex; min-height:100vh;}
  .sidebar{
    width:220px;
    background:var(--navy-deep);
    color:#dfe6ee;
    flex-shrink:0;
    transition:width .18s ease;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .sidebar.collapsed{width:64px;}
  .sidebar-head{
    padding:20px 18px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .brand-mark{
    width:30px;height:30px;flex-shrink:0;
    border-radius:7px;
    background:var(--gold);
    color:#3a2a05;
    font-weight:800;
    font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .brand-text{font-size:14px;font-weight:800; white-space:nowrap; overflow:hidden;}
  .sidebar.collapsed .brand-text, .sidebar.collapsed .nav-label, .sidebar.collapsed .sidebar-foot span{display:none;}
  .toggle-btn{
    position:absolute; top:16px; right:-13px;
    width:26px;height:26px;border-radius:50%;
    background:var(--gold); color:#3a2a05; border:2px solid var(--paper);
    cursor:pointer; font-size:12px; font-weight:800;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
  }
  .nav-list{list-style:none; margin:14px 0; padding:0; flex:1;}
  .nav-item{
    display:flex; align-items:center; gap:11px;
    padding:11px 18px;
    cursor:pointer;
    font-size:13.5px;
    font-weight:600;
    color:#c3ccd8;
    border-left:3px solid transparent;
    white-space:nowrap;
    overflow:hidden;
  }
  .nav-item .dot{
    width:8px;height:8px;border-radius:2px;background:#5a7196;flex-shrink:0;
  }
  .nav-item:hover{background:rgba(255,255,255,0.05); color:#fff;}
  .nav-item.active{
    background:rgba(200,149,44,0.14);
    color:#fff;
    border-left-color:var(--gold);
  }
  .nav-item.active .dot{background:var(--gold);}
  .sidebar-foot{
    padding:14px 18px 18px;
    border-top:1px solid rgba(255,255,255,0.08);
    font-size:12px;
    color:#93a1b3;
  }
  .sidebar-foot .who{font-weight:700; color:#e9edf2; margin-bottom:2px;}
  .sidebar-foot .role-badge{
    display:inline-block; margin-top:6px;
    font-size:10.5px; font-weight:700; letter-spacing:.04em;
    background:rgba(200,149,44,0.18); color:var(--gold);
    padding:2px 8px; border-radius:20px;
  }
  .logout-link{
    display:block; margin-top:12px; cursor:pointer;
    color:#93a1b3; font-size:12px; text-decoration:underline;
  }
  .logout-link:hover{color:#fff;}

  .main{flex:1; display:flex; flex-direction:column; min-width:0;}
  .topbar{
    min-height:60px; background:var(--panel); border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 26px; gap:12px; flex-wrap:wrap;
  }
  .topbar h1{font-size:17px; margin:0; font-weight:800;}
  .topbar .page-desc{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .content{padding:26px; flex:1; overflow:auto;}

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px;
    margin-bottom:20px;
  }
  .panel-title{
    font-size:14px; font-weight:800; margin:0 0 14px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .toolbar{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead th{
    text-align:left; font-size:11.5px; letter-spacing:.03em; text-transform:uppercase;
    color:var(--ink-soft); border-bottom:2px solid var(--line);
    padding:9px 10px; white-space:nowrap;
  }
  tbody td{border-bottom:1px solid var(--line); padding:8px 10px; vertical-align:middle;}
  tbody tr:hover{background:#fafbfc;}
  .cell-input{
    width:100%; border:1px solid transparent; background:transparent;
    padding:6px 7px; border-radius:6px; font-size:13px; font-family:inherit; color:var(--ink);
  }
  .cell-input:hover{border-color:var(--line);}
  .cell-input:focus{outline:none; border-color:var(--navy); background:#fff;}
  select.cell-input{cursor:pointer;}
  textarea.cell-input{resize:vertical; min-height:34px; line-height:1.4;}
  .item-name-cell{display:flex; align-items:baseline; gap:0;}

  .item-dot{
    display:inline-block; width:8px; height:8px; border-radius:50%;
    margin-right:7px; flex-shrink:0; vertical-align:middle; position:relative; top:-1px;
  }
  .dot-grey{background:#9aa4b0;}
  .dot-green{background:var(--ok);}
  .dot-red{background:#c0392b;}

  .status-pill{
    display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700;
    border:1px solid transparent;
  }
  .status-ok{background:var(--ok-bg); color:var(--ok);}
  .status-warn{background:var(--warn-bg); color:var(--warn);}
  .status-pending{background:var(--pending-bg); color:var(--pending);}

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--ink-soft);
  }
  .empty-state .big{font-size:34px; margin-bottom:6px;}
  .empty-state h2{font-size:16px; margin:6px 0 4px; color:var(--ink);}
  .empty-state p{font-size:13px; margin:0;}

  .row-x{
    color:#b3311f; cursor:pointer; font-size:16px; line-height:1; padding:4px 6px;
    border-radius:6px;
  }
  .row-x:hover{background:#fdeeeb;}

  /* modal */
  .modal-backdrop{
    display:none; position:fixed; inset:0; background:rgba(15,25,40,0.5);
    align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal-backdrop.show{display:flex;}
  .modal{
    background:#fff; border-radius:14px; width:100%; max-width:440px;
    padding:26px; max-height:85vh; overflow:auto;
  }
  .modal h3{margin:0 0 4px; font-size:16px; font-weight:800;}
  .modal .sub{font-size:12.5px; color:var(--ink-soft); margin:0 0 18px;}
  .emp-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 10px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px;
    font-size:13.5px;
  }
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:18px;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--navy-deep); color:#fff; padding:11px 20px; border-radius:8px;
    font-size:13px; font-weight:600; opacity:0; transition:all .25s; z-index:100;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .badge-soon{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11.5px; font-weight:700; color:var(--gold); background:var(--gold-soft);
    padding:4px 10px; border-radius:20px;
  }

  /* ---- employee list ---- */
  .seg-tabs{display:flex; gap:8px; margin-bottom:16px;}
  .seg-tab{
    border:1.5px solid var(--line); background:#fff; color:var(--ink-soft);
    font-family:inherit; font-size:13px; font-weight:700; padding:8px 16px;
    border-radius:20px; cursor:pointer; transition:all .15s;
  }
  .seg-tab:hover{border-color:var(--navy); color:var(--navy);}
  .seg-tab.active{background:var(--navy); border-color:var(--navy); color:#fff;}
  .emp-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px;}
  .emp-card{
    border:1px solid var(--line); border-radius:12px; padding:16px;
    cursor:pointer; background:#fff; transition:border-color .15s, box-shadow .15s;
    position:relative;
  }
  .emp-card:hover{border-color:var(--navy); box-shadow:0 6px 18px rgba(20,40,70,0.08);}
  .emp-card .name{font-size:15px; font-weight:800; margin-bottom:4px;}
  .emp-card .meta{font-size:12px; color:var(--ink-soft); line-height:1.7;}
  .emp-card .progress-wrap{margin-top:10px; height:6px; background:var(--line); border-radius:4px; overflow:hidden;}
  .emp-card .progress-bar{height:100%; background:var(--gold); border-radius:4px;}
  .emp-card .progress-label{font-size:11px; color:var(--ink-soft); margin-top:5px;}
  .emp-card .del-x{
    position:absolute; top:10px; right:10px; color:#b3311f; font-size:14px; padding:3px 6px;
    border-radius:6px; opacity:0; transition:opacity .15s;
  }
  .emp-card:hover .del-x{opacity:1;}
  .emp-card .del-x:hover{background:#fdeeeb;}

  /* ---- detail header ---- */
  .detail-header{
    background:var(--navy-deep); color:#fff; border-radius:var(--radius);
    padding:20px 24px; margin-bottom:20px;
  }
  .detail-header .back-link{
    color:#c9d3e0; font-size:12.5px; cursor:pointer; display:inline-flex; align-items:center; gap:4px;
    margin-bottom:12px;
  }
  .detail-header .back-link:hover{color:#fff;}
  .detail-header h2{margin:0 0 14px; font-size:19px; font-weight:800;}
  .hdr-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px;}
  .hdr-field label{display:block; font-size:11px; color:#a9b6c8; margin-bottom:5px; letter-spacing:.03em;}
  .hdr-field input, .hdr-field select{
    width:100%; padding:8px 10px; border-radius:7px; border:1px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.08); color:#fff; font-size:13px; font-family:inherit;
  }
  .hdr-field select option{color:#1b2430;}
  .hdr-field input::placeholder{color:#8ea0b8;}
  .hdr-field input:focus, .hdr-field select:focus{outline:none; border-color:var(--gold); background:rgba(255,255,255,0.14);}
  .hdr-field-row{display:flex; gap:6px; align-items:center;}
  .hdr-readonly{
    padding:8px 10px; border-radius:7px; border:1px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.05); color:#dfe6ee; font-size:13px;
  }
  .hdr-readonly.overdue{border-color:#e0a06b; background:rgba(224,90,50,0.18); color:#ffd9c2; font-weight:700;}

  .section-title{
    display:flex; align-items:center; gap:8px; font-size:14px; font-weight:800; margin:0 0 14px;
  }
  .section-title .tag{
    font-size:11px; font-weight:700; color:var(--navy); background:#e7edf5; padding:2px 9px; border-radius:20px;
  }
  .add-item-row{display:flex; gap:8px; align-items:center; padding-top:8px;}
  .add-item-row input{border:1px solid var(--line); max-width:280px;}

  /* ---- 規則頁 ---- */
  .stage-timeline{display:flex; flex-direction:column; align-items:stretch;}
  .stage-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px 24px;
  }
  .stage-card-head{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
  .stage-badge{
    font-size:10.5px; font-weight:800; letter-spacing:.06em; color:#fff;
    background:var(--navy); padding:4px 10px; border-radius:20px;
  }
  .stage-card-head h3{margin:0; font-size:17px; font-weight:800;}
  .rule-row{
    display:grid; grid-template-columns:180px 1fr; gap:14px;
    padding:10px 0; border-top:1px solid var(--line);
    font-size:13.5px; line-height:1.7;
  }
  .rule-row:first-of-type{border-top:none;}
  .rule-label{color:var(--ink-soft); font-weight:700;}
  .rule-value{color:var(--ink);}
  .stage-connector{
    text-align:center; color:var(--gold); font-size:20px; font-weight:800;
    padding:6px 0;
  }
  .rule-mini-timeline{
    display:flex; align-items:stretch; flex-wrap:wrap; gap:0;
    margin-top:16px; border-top:1px dashed var(--line); padding-top:16px;
  }
  .rule-mini-step{
    flex:1; min-width:120px; background:var(--paper); border:1px solid var(--line);
    border-radius:8px; padding:10px 12px;
  }
  .rule-mini-week{font-size:11.5px; font-weight:800; color:var(--navy); margin-bottom:4px;}
  .rule-mini-desc{font-size:12px; color:var(--ink-soft); line-height:1.5;}
  .rule-mini-arrow{
    display:flex; align-items:center; justify-content:center; color:#c3ccd8;
    font-size:16px; padding:0 6px;
  }
  .rule-linkage{
    margin-top:16px; font-size:12px; color:var(--navy);
    background:#eef3f9; border:1px solid #dbe6f2; border-radius:8px; padding:9px 12px;
  }
  @media (max-width:640px){
    .rule-row{grid-template-columns:1fr;}
    .rule-mini-timeline{flex-direction:column;}
    .rule-mini-arrow{transform:rotate(90deg); padding:2px 0;}
  }

  /* ---- 店務測驗：完整題庫 ---- */
  .bank-list{display:flex; flex-direction:column; gap:14px; margin-bottom:18px;}
  .bank-card{border:1px solid var(--line); border-radius:10px; padding:14px 16px; background:var(--paper);}
  .bank-card-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px;}
  .bank-cat-label{font-size:11px; font-weight:700; color:var(--navy); background:#e7edf5; padding:3px 9px; border-radius:20px;}
  .bank-cat-input{max-width:220px; border:1px solid var(--line); font-size:11.5px; font-weight:700; color:var(--navy);}
  .bank-stem-label{font-size:13.5px; font-weight:600; margin-bottom:8px; line-height:1.6;}
  .bank-stem-input{border:1px solid var(--line); font-weight:600; margin-bottom:8px; background:#fff;}
  .bank-options{display:flex; flex-direction:column; gap:6px;}
  .bank-opt-row{display:flex; align-items:center; gap:8px; font-size:13px; padding:4px 8px; border-radius:6px;}
  .bank-opt-row.correct{background:var(--ok-bg);}
  .bank-opt-letter{width:18px; height:18px; border-radius:50%; background:#dfe6ee; color:var(--ink); font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .bank-opt-text{flex:1;}
  .bank-correct-radio{font-size:11.5px; color:var(--ink-soft); display:flex; align-items:center; gap:4px; white-space:nowrap;}
  .bank-correct-tag{font-size:11px; font-weight:700; color:var(--ok);}
  .bank-ref-answer{font-size:13px;}
  .bank-ref-answer label{display:block; font-size:11px; font-weight:700; color:var(--ink-soft); margin-bottom:4px;}
  .bank-add-form{border-top:1px dashed var(--line); margin-top:6px; padding-top:16px;}

  /* ---- 店務測驗：正式考題 ---- */
  .current-exam-box{border:1px solid var(--line); border-radius:10px; padding:16px; margin-top:16px; background:var(--paper);}
  .current-exam-head{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; font-size:13px; margin-bottom:12px;}
  .current-exam-list{margin:0; padding-left:20px; display:flex; flex-direction:column; gap:14px;}
  .current-exam-list li{font-size:13px;}
  .cq-cat{font-size:11px; font-weight:700; color:var(--navy); margin-bottom:3px;}
  .cq-stem{font-weight:600; margin-bottom:6px; line-height:1.6;}
  .cq-opts div{padding:2px 0; color:var(--ink-soft);}
  .cq-opts .cq-correct{color:var(--ok); font-weight:700;}
  .cq-answer{color:var(--ink-soft);}
  .grade-total-preview{font-size:13.5px; background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin:4px 0 6px;}
  .retake-tag{display:inline-block; font-size:10.5px; font-weight:700; color:var(--warn); background:var(--warn-bg); padding:1px 8px; border-radius:20px; margin-left:2px;}

  /* ---- 列印樣式 ---- */
  #printArea{display:none;}
  /* ---- 設定：組織架構 ---- */
  .org-card{margin-bottom:18px;}
  .org-card-head{display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--line);}
  .org-class-title{font-size:16px; font-weight:800;}

async function storageGet(key, shared){
  if(!shared){
    // 非共用資料（例如「記住我」的登入資訊）：只存在使用者自己的瀏覽器
    try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e){ return null; }
  }
  try{
    const snap = await db.collection(FIRESTORE_COLLECTION).doc(key).get();
    return snap.exists ? snap.data().v : null;
  }catch(e){ console.error('storage get failed', key, e); return null; }
}
async function storageSet(key, value, shared){
  if(!shared){
    try{
      if(value === null || value === undefined) localStorage.removeItem(key);
      else localStorage.setItem(key, JSON.stringify(value));
    }catch(e){ /* ignore */ }
    return;
  }
  try{
    if(value === null || value === undefined){
      await db.collection(FIRESTORE_COLLECTION).doc(key).delete();
    } else {
      await db.collection(FIRESTORE_COLLECTION).doc(key).set({ v: value });
    }
  }catch(e){ console.error('storage set failed', key, e); showToast('雲端儲存失敗，請確認網路連線'); }
}
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, s => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[s]));
}

function blankTrainingData(){

        item:t.item, guide:'', trainDate: t.trainDate || '', checker:'', checkDate:'', status:'待驗收', isCustom:false
      }));
      return acc;
    }, {})
  };
}
// 向下相容：若讀到舊格式資料（缺 item / isCustom 欄位），依模板索引補齊
function hydrateTrainingData(data){
  if(!data) return blankTrainingData();
  data.onboarding = (data.onboarding || []).map((row,i) => ({
    item: row.item !== undefined ? row.item : (ONBOARDING_ITEMS[i] ? ONBOARDING_ITEMS[i].item : ('自訂項目')),
    completeDate: row.completeDate || '',
    note: row.note || '',
    isCustom: row.isCustom === true || row.item === undefined ? (row.isCustom === true) : false,
  }));
  data.categories = data.categories || {};
  CATEGORY_ORDER.forEach(cat => {
    const tmpl = TRAINING_CATEGORIES[cat];
    data.categories[cat] = (data.categories[cat] || []).map((row,i) => ({
      item: row.item !== undefined ? row.item : (tmpl[i] ? tmpl[i].item : '自訂項目'),
      guide: row.guide || '',
      trainDate: row.trainDate || '',
      checker: row.checker || '',
      checkDate: row.checkDate || '',
      status: row.status || '待驗收',
      isCustom: row.isCustom === true,
    }));
  });
  return data;
}

// 合格判定：以是否已填「驗收日期」為準；無驗收日期欄位的分類（規範）則以「訓練日期」是否已填為替代依據
function progressOf(id){
  const d = trainingData[id];
  if(!d) return { done:0, total:0, pct:0 };
  let done = 0, total = 0;
  CATEGORY_ORDER.forEach(cat => {
    const cols = colsOf(cat);
    const useCheckDate = cols.includes('checkDate');
    (d.categories[cat] || []).forEach(r => {
      total++;
      const filled = useCheckDate ? !!r.checkDate : !!r.trainDate;
      if(filled) done++;
    });
  });
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

async function renderEmployeeList(){
  document.getElementById('pageDesc').textContent = '點選員工即可查看該員工的教育訓練總表';
  document.getElementById('topbarActions').innerHTML = isAdmin()
    ? `<button class="btn btn-gold" onclick="openEmpModal()">＋ 新增員工</button>` : '';

  if(!employees.length){
    document.getElementById('content').innerHTML = `
      <div class="panel">
        <div class="empty-state">
          <div class="big">👤</div>
          <h2>尚未建立任何員工</h2>
          <p>${isAdmin() ? '點選右上角「新增員工」建立第一位員工的教育訓練總表。' : '請聯繫管理者新增員工資料。'}</p>
        </div>
      </div>`;
    return;
  }

  // 預先載入所有員工的訓練資料，以計算進度條
  for(const e of employees){
    if(!trainingData[e.id]){
      trainingData[e.id] = hydrateTrainingData(await storageGet('training-data:' + e.id, true) || blankTrainingData());
    }
  }

  const withProgress = employees.map(e => ({ e, p: progressOf(e.id) }));
  const ongoing = withProgress.filter(x => x.p.total === 0 || x.p.pct < 100);
  const completed = withProgress.filter(x => x.p.total > 0 && x.p.pct === 100);
  const list = empListFilter === 'completed' ? completed : ongoing;

  const tabsHtml = `
    <div class="seg-tabs">
      <button class="seg-tab ${empListFilter==='ongoing'?'active':''}" onclick="setEmpListFilter('ongoing')">進行中 (${ongoing.length})</button>
      <button class="seg-tab ${empListFilter==='completed'?'active':''}" onclick="setEmpListFilter('completed')">已完成 (${completed.length})</button>
    </div>`;

  if(!list.length){
    document.getElementById('content').innerHTML = tabsHtml + `
      <div class="panel">
        <div class="empty-state">
          <div class="big">${empListFilter==='completed' ? '🎉' : '📋'}</div>
          <h2>${empListFilter==='completed' ? '目前尚無已完成訓練的員工' : '目前沒有進行中的員工'}</h2>
          <p>${empListFilter==='completed' ? '當員工所有訓練項目都已填驗收日期，會自動顯示於此。' : ''}</p>
        </div>
      </div>`;
    return;
  }

  const cards = list.map(({e,p}) => `
    <div class="emp-card" onclick="openEmployee('${e.id}')">
      ${isAdmin() ? `<span class="del-x" onclick="event.stopPropagation(); removeEmployee('${e.id}')" title="移除員工">✕</span>` : ''}
      <div class="name">${escapeHtml(e.name)}</div>
      <div class="meta">
        工號：${escapeHtml(e.empCode||'—')}　課別：${escapeHtml(e.empClass||'—')}<br>
        報到日：${escapeHtml(e.onboardDate||'—')}　報到門市：${escapeHtml(e.onboardStore||'—')}
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${p.pct}%"></div></div>
      <div class="progress-label">已填驗收日期 ${p.done} / ${p.total}（${p.pct}%）</div>
    </div>`
  ).join('');

  document.getElementById('content').innerHTML = tabsHtml + `<div class="emp-grid">${cards}</div>`;
}
function setEmpListFilter(filter){
  empListFilter = filter;
  render();
}

function storeOptionsForClass(empClass, selected){
  if(!empClass){
    let opts = `<option value="">請先選擇課別</option>`;
    if(selected) opts += `<option value="${escapeHtml(selected)}" selected>${escapeHtml(selected)}</option>`;
    return opts;
  }
  const cls = orgStructure[empClass];
  const names = cls ? cls.stores.map(s => s.name) : [];
  let opts = `<option value="">請選擇</option>`;
  const list = names.slice();
  if(selected && !list.includes(selected)) list.unshift(selected); // 保留舊資料中已不在清單的門市
  opts += list.map(s => `<option value="${escapeHtml(s)}" ${s===selected?'selected':''}>${escapeHtml(s)}</option>`).join('');
  return opts;
}

async function persistTrainingData(id){
  await storageSet('training-data:' + id, trainingData[id], true);
}
function updateOnboarding(id, idx, field, value){
  trainingData[id].onboarding[idx][field] = value;
  persistTrainingData(id);
  if(field === 'completeDate') renderEmployeeDetail(id); // 更新圓點顏色
}
function updateOnboardItemName(id, idx, value){
  trainingData[id].onboarding[idx].item = value;
  persistTrainingData(id);
}
function updateCatRow(id, cat, idx, field, value){
  trainingData[id].categories[cat][idx][field] = value;
  persistTrainingData(id);
  if(field === 'status') renderEmployeeDetail(id); // 更新圓點顏色
}
function updateItemName(id, cat, idx, value){
  trainingData[id].categories[cat][idx].item = value;
  persistTrainingData(id);
}
async function updateEmpField(id, field, value){
  const emp = employees.find(e=>e.id===id);
  if(!emp) return;
  if(field === 'empClass' && emp.onboardStore){
    const cls = orgStructure[value];
    const validNames = cls ? cls.stores.map(s=>s.name) : [];
    if(!validNames.includes(emp.onboardStore)) emp.onboardStore = ''; // 課別變更後，若原門市不在新課別中則清空
  }
  emp[field] = value;
  await storageSet('employees', employees, true);
  if(field === 'name' || field === 'empClass' || field === 'onboardDate') renderEmployeeDetail(id);
}
function computeThreeMonthDeadline(onboardDate){
  if(!onboardDate) return '';
  const d = new Date(onboardDate + 'T00:00:00');
  if(isNaN(d.getTime())) return '';
  d.setMonth(d.getMonth() + 3);
  return d.toISOString().slice(0,10);
}

  persistTrainingData(id);
  renderEmployeeDetail(id);
  showToast('已新增報到流程項目');
}
function deleteOnboardRow(id, idx){
  trainingData[id].onboarding.splice(idx,1);

function addCustomItem(id, cat){
  const inputEl = document.getElementById('newItemInput_' + cat);

  trainingData[id].categories[cat].push({
    item:name, guide:'', trainDate:'', checker:'', checkDate:'', status:'待驗收', isCustom:true
  });

  renderEmployeeDetail(id);
  showToast('已新增「' + cat + '」項目');

function deleteCatRow(id, cat, idx){
  trainingData[id].categories[cat].splice(idx,1);
  persistTrainingData(id);
  renderEmployeeDetail(id);
}

async function loadExamRecords(employeeId){
  if(!storeExamRecordsCache[employeeId]){
    storeExamRecordsCache[employeeId] = await storageGet('exam-records:' + employeeId, true) || [];
  }
  return storeExamRecordsCache[employeeId];
}
async function saveExamRecords(employeeId){
  await storageSet('exam-records:' + employeeId, storeExamRecordsCache[employeeId], true);
}
function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function renderStoreBank(){
  const stageTabsHtml = STORE_STAGE_ORDER.map(s => `

  document.getElementById('storeSubContent').innerHTML = `
    <div class="panel" style="margin-bottom:16px;">

function setBankStage(s){ bankStageView = s; renderStoreBank(); }

function renderBankQuestionCard(stage, q, idx){
  const delBtn = isAdmin() ? `<span class="row-x" onclick="deleteBankQuestion('${stage}',${idx})" title="刪除題目">✕</span>` : '';
  const catField = isAdmin()
    ? `<input class="cell-input bank-cat-input" value="${escapeHtml(q.category)}" placeholder="分類標籤" onchange="updateBankField('${stage}',${idx},'category',this.value)">`
    : `<span class="bank-cat-label">${escapeHtml(q.category)}</span>`;
  const stemField = isAdmin()
    ? `<textarea class="cell-input bank-stem-input" rows="2" onchange="updateBankField('${stage}',${idx},'question',this.value)">${escapeHtml(q.question)}</textarea>`
    : `<div class="bank-stem-label">${escapeHtml(q.question)}</div>`;

  let bodyHtml = '';
  if(q.type === 'choice'){
    bodyHtml = `<div class="bank-options">${q.options.map((opt,oi) => `
      <div class="bank-opt-row ${oi===q.correctIndex?'correct':''}">
        <span class="bank-opt-letter">${'ABCD'[oi]}</span>
        ${isAdmin()
          ? `<input class="cell-input" value="${escapeHtml(opt)}" onchange="updateBankOption('${stage}',${idx},${oi},this.value)">`
          : `<span class="bank-opt-text">${escapeHtml(opt)}</span>`}
        ${isAdmin()
          ? `<label class="bank-correct-radio"><input type="radio" name="correct_${stage}_${idx}" ${oi===q.correctIndex?'checked':''} onchange="updateBankField('${stage}',${idx},'correctIndex',${oi})"> 正解</label>`
          : (oi===q.correctIndex ? '<span class="bank-correct-tag">✓ 正解</span>' : '')}
      </div>`).join('')}</div>`;
  } else {
    bodyHtml = `<div class="bank-ref-answer"><label>參考答案</label>${
      isAdmin()
        ? `<textarea class="cell-input" rows="2" onchange="updateBankField('${stage}',${idx},'referenceAnswer',this.value)">${escapeHtml(q.referenceAnswer)}</textarea>`
        : `<div>${escapeHtml(q.referenceAnswer)}</div>`
    }</div>`;
  }

  return `
    <div class="bank-card">
      <div class="bank-card-head">${catField}${delBtn}</div>
      ${stemField}
      ${bodyHtml}
    </div>`;
}

function toggleNewQFields(){
  const typeEl = document.getElementById('newQType');
  if(!typeEl) return;
  const type = typeEl.value;
  document.getElementById('newQChoiceFields').style.display = type==='choice' ? 'block' : 'none';
  document.getElementById('newQShortFields').style.display = type==='short' ? 'block' : 'none';
}

async function persistBank(){ await storageSet('store-question-bank', storeQuestionBank, true); }
function updateBankField(stage, idx, field, value){
  storeQuestionBank[stage][idx][field] = value;
  persistBank();
  if(field==='correctIndex') renderStoreBank();
}
function updateBankOption(stage, idx, oi, value){
  storeQuestionBank[stage][idx].options[oi] = value;
  persistBank();
}
function deleteBankQuestion(stage, idx){
  if(!confirm('確定要刪除這一題嗎？此動作無法復原。')) return;
  storeQuestionBank[stage].splice(idx,1);
  persistBank();
  renderStoreBank();
  showToast('已刪除題目');
}
function addBankQuestion(){
  const stage = bankStageView;
  const type = document.getElementById('newQType').value;
  const category = document.getElementById('newQCategory').value.trim();
  const stem = document.getElementById('newQStem').value.trim();
  if(!stem){ showToast('請輸入題目內容'); return; }
  let q;
  if(type === 'choice'){
    const options = [0,1,2,3].map(i => document.getElementById('newQOpt'+i).value.trim());
    if(options.some(o=>!o)){ showToast('請完整填寫四個選項'); return; }
    const correctRadio = document.querySelector('input[name="newQCorrect"]:checked');
    const correctIndex = correctRadio ? parseInt(correctRadio.value,10) : 0;
    q = { id: uid('q'), type:'choice', category, question:stem, options, correctIndex };
  } else {
    const answer = document.getElementById('newQAnswer').value.trim();
    if(!answer){ showToast('請輸入參考答案'); return; }
    q = { id: uid('q'), type:'short', category, question:stem, referenceAnswer: answer };
  }
  storeQuestionBank[stage].push(q);
  persistBank();
  renderStoreBank();
  showToast('已新增題目');
}

  return `
    <table>
      <thead><tr><th>階段</th><th>產生日期</th><th>店務得分</th><th>商品得分</th><th>總分</th><th>驗收人</th><th>狀態</th><th style="width:110px;"></th></tr></thead>
      <tbody>
        ${sorted.map(r => `
          <tr>
            <td>${escapeHtml(r.stage)}${r.isRetake ? ' <span class="retake-tag">補考</span>' : ''}</td>
            <td>${escapeHtml(r.createdAt)}</td>
            <td>${r.storeScore!=null ? r.storeScore : '—'}</td>
            <td>${r.productScore!=null ? r.productScore : '—'}</td>
            <td>${r.totalScore!=null ? r.totalScore : '—'}</td>
            <td>${escapeHtml(r.gradedBy||'—')}</td>
            <td><span class="status-pill ${r.status==='合格'?'status-ok':r.status==='不合格'?'status-warn':'status-pending'}">${escapeHtml(r.status)}</span></td>

}

function generateExam(){
  if(!examGenEmployeeId){ showToast('請先建立員工'); return; }
  const stage = examGenStage;
  const pool = storeQuestionBank[stage] || [];
  if(pool.length < 1){ showToast('此階段題庫目前沒有題目'); return; }

  const records = storeExamRecordsCache[examGenEmployeeId] || [];
  const stageRecords = records.filter(r=>r.stage===stage).slice().sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
  const formalRecords = stageRecords.filter(r=>!r.isRetake);
  const retakeRecords = stageRecords.filter(r=>r.isRetake);
  const limit = STAGE_EXAM_LIMITS[stage] || 2;

  let isRetake = false;
  if(formalRecords.length < limit){
    isRetake = false; // 正式驗收名額尚未用完
  } else {
    const latestRecord = stageRecords[stageRecords.length - 1];
    if(retakeRecords.length > 0){
      showToast('此員工已完成「' + stage + '」階段所有驗收機會（含補考），若仍未合格請依規定啟動資遣機制。');
      return;
    }
    if(!latestRecord || latestRecord.status === '合格'){
      showToast('此員工已完成「' + stage + '」階段驗收（共' + limit + '次）且已合格，無需再產生考題。');
      return;
    }
    if(latestRecord.status === '待批改'){
      showToast('此員工在「' + stage + '」階段尚有一份考卷待批改分數，請先完成批改再產生新考題。');
      return;
    }
    // 已用完正式驗收名額，且最近一次為不合格 → 開放一次補考
    isRetake = true;
  }

  const usedIds = new Set();
  stageRecords.forEach(r => (r.questions||[]).forEach(q => usedIds.add(q.id)));

  const drawCount = Math.min(STORE_DRAW_COUNT, pool.length);
  const fresh = pool.filter(q => !usedIds.has(q.id));
  let picked;
  if(fresh.length >= drawCount){
    picked = shuffleArray(fresh).slice(0, drawCount);
  } else {
    picked = shuffleArray(fresh);
    const need = drawCount - picked.length;
    const usedPool = pool.filter(q => usedIds.has(q.id));
    picked = picked.concat(shuffleArray(usedPool).slice(0, need));
    showToast('此階段新題不足，已從舊題中補足以避免超出題庫');
  }

  const record = {
    id: uid('exam'),
    employeeId: examGenEmployeeId,
    stage,
    isRetake,
    createdAt: new Date().toISOString().slice(0,10),
    questions: picked.map(q => JSON.parse(JSON.stringify(q))),
    storeScore: null,
    productScore: null,
    totalScore: null,
    status: '待批改',
    gradedBy: '',
    gradedAt: '',
  };

  if(!storeExamRecordsCache[examGenEmployeeId]) storeExamRecordsCache[examGenEmployeeId] = [];
  storeExamRecordsCache[examGenEmployeeId].push(record);
  saveExamRecords(examGenEmployeeId);

  lastGeneratedExam = record;
  render();
  showToast('已產生考卷，可下載列印或直接輸入分數');
}

/* ---- 列印（考題卷／答案卷）：使用瀏覽器列印功能，於列印視窗選擇「另存為 PDF」 ---- */
async function printExam(employeeId, examId, withAnswers){
  const records = await loadExamRecords(employeeId);
  const record = records.find(r=>r.id===examId);
  if(!record){ showToast('找不到這份考卷'); return; }
  const emp = employees.find(e=>e.id===employeeId);
  const empName = emp ? emp.name : '';
  const empCode = emp ? (emp.empCode||'') : '';
  const title = withAnswers ? '答案卷' : '考題卷';

  const qHtml = record.questions.map((q,i) => {
    const optsOrBlank = q.type === 'choice'
      ? `<div class="print-opts">${q.options.map((o,oi)=>`<div class="print-opt ${withAnswers && oi===q.correctIndex ? 'print-opt-correct':''}">${'ABCD'[oi]}. ${escapeHtml(o)}${withAnswers && oi===q.correctIndex ? '　←正解' : ''}</div>`).join('')}</div>`
      : (withAnswers
          ? `<div class="print-answer-line">參考答案：${escapeHtml(q.referenceAnswer)}</div>`
          : `<div class="print-blank-lines"><div class="print-line"></div><div class="print-line"></div></div>`);
    return `<div class="print-q"><div class="print-q-head">${i+1}. 【${escapeHtml(q.category)}】${escapeHtml(q.question)}</div>${optsOrBlank}</div>`;
  }).join('');

  document.getElementById('printArea').innerHTML = `
    <div class="print-header">
      <h1>${escapeHtml(record.stage)}階段 店務測驗 ${title}</h1>
      <div class="print-meta">姓名：${escapeHtml(empName)}　　工號：${escapeHtml(empCode)}　　日期：${escapeHtml(record.createdAt)}　　得分：＿＿＿＿</div>
    </div>
    ${qHtml}
  `;
  setTimeout(()=> window.print(), 150);
}

/* ---- 輸入分數 ---- */
let gradeModalTarget = null;
async function openGradeModal(employeeId, examId){
  const records = await loadExamRecords(employeeId);
  const record = records.find(r=>r.id===examId);
  if(!record){ showToast('找不到這份考卷'); return; }
  gradeModalTarget = { employeeId, examId };
  document.getElementById('gradeModalSub').textContent = record.stage + ' 階段考卷，共 ' + record.questions.length + ' 題店務題';
  document.getElementById('gradeGradedBy').value = record.gradedBy || '';
  document.getElementById('gradeStoreMax').textContent = record.questions.length;
  const correctInput = document.getElementById('gradeStoreCorrect');
  correctInput.max = record.questions.length;
  correctInput.value = record.storeScore!=null ? Math.round(record.storeScore / STORE_POINTS_PER_Q) : '';
  document.getElementById('gradeProductScore').value = record.productScore!=null ? record.productScore : '';
  updateGradeTotalPreview();
  document.getElementById('gradeModal').classList.add('show');
}
function closeGradeModal(){
  document.getElementById('gradeModal').classList.remove('show');
  gradeModalTarget = null;
}
function updateGradeTotalPreview(){
  const correct = parseFloat(document.getElementById('gradeStoreCorrect').value) || 0;
  const product = parseFloat(document.getElementById('gradeProductScore').value) || 0;
  const storeScore = correct * STORE_POINTS_PER_Q;
  const total = storeScore + product;
  const pass = total >= EXAM_PASS_SCORE;
  document.getElementById('gradeTotalPreview').innerHTML =
    `店務得分 ${storeScore} 分 ＋ 商品得分 ${product} 分 ＝ <strong>總分 ${total} 分</strong>　<span class="status-pill ${pass?'status-ok':'status-warn'}">${pass?'合格':'未達合格'}</span>`;
}
async function saveGrade(){
  if(!gradeModalTarget) return;
  const { employeeId, examId } = gradeModalTarget;
  const records = storeExamRecordsCache[employeeId];
  const record = records.find(r=>r.id===examId);
  if(!record) return;
  const correctInputVal = document.getElementById('gradeStoreCorrect').value;
  const productInputVal = document.getElementById('gradeProductScore').value;
  if(correctInputVal === ''){ showToast('請輸入店務答對題數'); return; }
  const correct = Math.max(0, Math.min(record.questions.length, parseInt(correctInputVal,10) || 0));
  const product = productInputVal === '' ? 0 : Math.max(0, Math.min(PRODUCT_MAX_POINTS, parseFloat(productInputVal)));
  const storeScore = correct * STORE_POINTS_PER_Q;
  const total = storeScore + product;
  record.storeScore = storeScore;
  record.productScore = product;
  record.totalScore = total;
  record.status = total >= EXAM_PASS_SCORE ? '合格' : '不合格';
  record.gradedBy = document.getElementById('gradeGradedBy').value.trim();
  record.gradedAt = new Date().toISOString().slice(0,10);
  await saveExamRecords(employeeId);
  closeGradeModal();
  render();
  showToast('已儲存分數：' + total + ' 分（' + record.status + '）');
}

  const cls = document.getElementById('newEmpClass').value;
  if(!name){ showToast('請輸入員工姓名'); return; }
  if(employees.some(e=>e.name===name)){ showToast('此員工已存在'); return; }
  const emp = { id: uid('emp'), name, empCode: code, empClass: cls, onboardDate:'', onboardStore:'' };
  employees.push(emp);
  await storageSet('employees', employees, true);
  trainingData[emp.id] = blankTrainingData();
  await storageSet('training-data:' + emp.id, trainingData[emp.id], true);
  closeEmpModal();
  render();
  showToast('已新增員工：' + name);
}
async function removeEmployee(id){
  const emp = employees.find(e=>e.id===id);
  if(!emp) return;
  if(!confirm('確定要移除「' + emp.name + '」及其教育訓練總表嗎？此動作無法復原。')) return;
  employees = employees.filter(e=>e.id!==id);
  await storageSet('employees', employees, true);
  delete trainingData[id];
  await storageSet('training-data:' + id, null, true);
  if(selectedEmployeeId === id) selectedEmployeeId = null;
  render();
  showToast('已移除員工：' + emp.name);
}

/* ===================== 設定：組織架構（課別／門市）管理 ===================== */
async function persistOrgStructure(){
  await storageSet('org-structure', orgStructure, true);
}

function renderSettings(){
  document.getElementById('topbarActions').innerHTML = '';

  const cardsHtml = CLASS_OPTIONS.map(cls => {
    const info = orgStructure[cls] || { code:'', leader:'', stores:[] };
    const storesHtml = info.stores.map((s, si) => `
      <div class="org-store-row">
        ${isAdmin() ? `
          <input class="cell-input org-store-code" value="${escapeHtml(s.code)}" placeholder="門市代號" onchange="updateOrgStore('${cls}',${si},'code',this.value)">
          <input class="cell-input org-store-name" value="${escapeHtml(s.name)}" placeholder="門市名稱" onchange="updateOrgStore('${cls}',${si},'name',this.value)">
          <input class="cell-input org-store-manager" value="${escapeHtml(s.manager)}" placeholder="負責人" onchange="updateOrgStore('${cls}',${si},'manager',this.value)">
          <span class="row-x" onclick="deleteOrgStore('${cls}',${si})" title="移除門市">✕</span>
        ` : `
          <span class="org-store-code-label">${escapeHtml(s.code)}</span>
          <span class="org-store-name-label">${escapeHtml(s.name)}</span>
          <span class="org-store-manager-label">${escapeHtml(s.manager)}</span>
        `}
      </div>`).join('');

    return `
      <div class="panel org-card">
        <div class="org-card-head">
          <div class="org-class-title">${escapeHtml(cls)}</div>
          <div class="org-class-fields">
            <div class="field" style="margin-bottom:0;">
              <label>課別代號</label>
              ${isAdmin()
                ? `<input class="cell-input" style="border:1px solid var(--line);" value="${escapeHtml(info.code)}" onchange="updateOrgClassField('${cls}','code',this.value)">`
                : `<div class="hdr-readonly-light">${escapeHtml(info.code)}</div>`}
            </div>
            <div class="field" style="margin-bottom:0;">
              <label>課長</label>
              ${isAdmin()
                ? `<input class="cell-input" style="border:1px solid var(--line);" value="${escapeHtml(info.leader)}" onchange="updateOrgClassField('${cls}','leader',this.value)">`
                : `<div class="hdr-readonly-light">${escapeHtml(info.leader)}</div>`}
            </div>
          </div>
        </div>
        <div class="org-store-list">
          <div class="org-store-row org-store-header">
            <span>門市代號</span><span>門市名稱</span><span>負責人</span><span></span>
          </div>
          ${storesHtml || '<p style="font-size:13px;color:var(--ink-soft); padding:8px 0;">此課別尚無門市。</p>'}
        </div>
        ${isAdmin() ? `
          <div class="add-item-row" style="margin-top:12px;">
            <input type="text" class="cell-input" style="border:1px solid var(--line); max-width:100px;" id="newStoreCode_${cls}" placeholder="代號">
            <input type="text" class="cell-input" style="border:1px solid var(--line);" id="newStoreName_${cls}" placeholder="門市名稱">
            <input type="text" class="cell-input" style="border:1px solid var(--line); max-width:120px;" id="newStoreManager_${cls}" placeholder="負責人">
            <button class="btn btn-ghost btn-sm" onclick="addOrgStore('${cls}')">＋ 新增門市</button>
          </div>` : ''}
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="panel" style="margin-bottom:20px;">
      <div class="section-title" style="margin-bottom:8px;">組織架構總覽</div>
      <p style="font-size:13.5px; color:var(--ink-soft); line-height:1.8; margin:0;">
        依課別維護所屬門市清單。新增員工並選擇「課別」後，員工詳細頁的「報到門市」下拉選單會自動列出該課別底下的門市。
        ${isAdmin() ? '' : '（僅管理者可編輯此頁內容）'}
      </p>
    </div>
    ${cardsHtml}
  `;
}

function updateOrgClassField(cls, field, value){
  orgStructure[cls][field] = value;
  persistOrgStructure();
}
function updateOrgStore(cls, idx, field, value){
  orgStructure[cls].stores[idx][field] = value;
  persistOrgStructure();
}
function deleteOrgStore(cls, idx){
  if(!confirm('確定要移除這間門市嗎？')) return;
  orgStructure[cls].stores.splice(idx,1);
  persistOrgStructure();
  renderSettings();
  showToast('已移除門市');
}
function addOrgStore(cls){
  const code = document.getElementById('newStoreCode_' + cls).value.trim();
  const name = document.getElementById('newStoreName_' + cls).value.trim();
  const manager = document.getElementById('newStoreManager_' + cls).value.trim();
  if(!name){ showToast('請輸入門市名稱'); return; }
  orgStructure[cls].stores.push({ code, name, manager });
  persistOrgStructure();
  renderSettings();
  showToast('已新增門市：' + name);
}
</script>
